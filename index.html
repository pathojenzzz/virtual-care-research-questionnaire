<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Research Questionnaire</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <p class="institution">WEST VISAYAS STATE UNIVERSITY<br>COLLEGE OF NURSING<br>La Paz, Iloilo City</p>
      <h1>TASK LOAD, PERCEIVED STRESS, AND JOB SATISFACTION AMONG NURSES IN VIRTUAL CARE CENTERS IN A HIGHLY URBANIZED CITY</h1>
    </header>

    <main class="app-shell">
      <div class="progress-card" aria-live="polite">
        <div class="progress-meta">
          <span id="progressText">Part I of V</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <ol class="step-list" id="stepList"></ol>
      </div>

      <form id="questionnaireForm" novalidate>
        <div id="sections"></div>

        <div class="form-actions">
          <button class="secondary-button" id="prevButton" type="button">Previous</button>
          <button class="primary-button" id="nextButton" type="button">Next</button>
          <button class="primary-button" id="submitButton" type="submit">Submit Responses</button>
        </div>

        <div class="status-message" id="statusMessage" role="status" aria-live="polite"></div>
      </form>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
